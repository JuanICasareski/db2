services:
  mongodb:
    # mongo:8 segfaultea al minuto en esta maquina (exit 139); 7 es estable
    image: mongo:7
    container_name: flowops-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mongodb_data:
